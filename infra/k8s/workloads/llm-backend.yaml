apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-backend
  namespace: agentic-testbed
  labels:
    app: llm-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-backend
  template:
    metadata:
      labels:
        app: llm-backend
    spec:
      containers:
        - name: llm-backend
          image: llm-backend:local
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              value: node3_llm
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-credentials
                  key: HF_TOKEN
            - name: HUGGINGFACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-credentials
                  key: HF_TOKEN
            - name: LOG_LLM_REQUESTS
              value: "0"
            - name: LLM_LOG_MAX_CHARS
              value: "500"
            - name: LLM_DTYPE
              value: "float16"
            - name: LLM_MAX_NUM_SEQS
              value: "12"
            - name: LLM_MAX_NUM_BATCHED_TOKENS
              value: "8192"
            - name: LLM_MAX_TOKENS
              value: "512"
            - name: LLM_GPU_MEMORY_UTILIZATION
              value: "0.90"
            - name: LLM_METRICS_ENABLED
              value: "1"
            - name: LLM_METRICS_INCLUDE_TOKENS
              value: "1"
            - name: LLM_METRICS_PREFIX
              value: "llm"
            - name: LLM_MODEL
              value: "meta-llama/Llama-3.1-8B-Instruct"
          command:
            - python3
            - -m
            - llm.serve_llm
            - --model
            - meta-llama/Llama-3.1-8B-Instruct
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --max-model-len
            - "4096"
            - --dtype
            - float16
            - --max-num-seqs
            - "12"
            - --max-num-batched-tokens
            - "8192"
            - --gpu-memory-utilization
            - "0.90"
          ports:
            - name: http
              containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1
---
apiVersion: v1
kind: Service
metadata:
  name: llm-backend
  namespace: agentic-testbed
  labels:
    app: llm-backend
spec:
  type: NodePort
  selector:
    app: llm-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080

