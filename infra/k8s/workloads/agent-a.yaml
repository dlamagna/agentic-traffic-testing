apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-a
  namespace: agentic-testbed
  labels:
    app: agent-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-a
  template:
    metadata:
      labels:
        app: agent-a
    spec:
      containers:
        - name: agent-a
          image: docker.io/dlamagna/agent-a:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LLM_SERVER_URL
              value: http://saturn.cba.upc.edu:8000/chat
            - name: NODE_NAME
              value: node1_agentA
            - name: AGENT_A_PORT
              value: "8101"
            - name: OTEL_SERVICE_NAME
              value: agent-a
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4318/v1/traces
            - name: AGENT_B_URLS
              value: http://agent-b:8102/subtask
            - name: LLM_TIMEOUT_SECONDS
              value: "120"
            - name: AGENT_B_TIMEOUT_SECONDS
              value: "120"
            - name: LOG_LLM_REQUESTS
              value: "0"
            - name: LLM_LOG_MAX_CHARS
              value: "500"
          command:
            - python
            - -m
            - agents.agent_a.server
          ports:
            - name: http
              containerPort: 8101
---
apiVersion: v1
kind: Service
metadata:
  name: agent-a
  namespace: agentic-testbed
  labels:
    app: agent-a
spec:
  type: NodePort
  selector:
    app: agent-a
  ports:
    - name: http
      port: 8101
      targetPort: 8101
      nodePort: 30101

