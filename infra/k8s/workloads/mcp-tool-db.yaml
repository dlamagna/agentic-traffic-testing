apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-tool-db
  namespace: agentic-testbed
  labels:
    app: mcp-tool-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-tool-db
  template:
    metadata:
      labels:
        app: mcp-tool-db
    spec:
      containers:
        - name: mcp-tool-db
          image: docker.io/dlamagna/mcp-tool-db:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              value: node2_toolDB
            - name: MCP_TOOL_DB_PORT
              value: "8201"
          command: []
          ports:
            - name: http
              containerPort: 8201
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-tool-db
  namespace: agentic-testbed
  labels:
    app: mcp-tool-db
spec:
  type: NodePort
  selector:
    app: mcp-tool-db
  ports:
    - name: http
      port: 8201
      targetPort: 8201
      nodePort: 30201

